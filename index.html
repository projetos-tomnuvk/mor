<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>💜 Pergunta especial</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #1a0a3c;
      font-family: Georgia, serif;
      overflow: hidden;
      position: relative;
    }

    .heart-particle {
      position: absolute;
      opacity: 0.18;
      animation: floatUp 6s ease-in-out infinite;
      color: #AFA9EC;
      pointer-events: none;
      font-size: 20px;
    }

    @keyframes floatUp {
      0%   { transform: translateY(80px) rotate(0deg); opacity: 0; }
      30%  { opacity: 0.22; }
      80%  { opacity: 0.22; }
      100% { transform: translateY(-60px) rotate(20deg); opacity: 0; }
    }

    .card {
      background: #2d1a5e;
      border: 2px solid #7F77DD;
      border-radius: 20px;
      padding: 2.8rem 2.2rem;
      max-width: 420px;
      width: 90%;
      text-align: center;
      position: relative;
      z-index: 2;
      box-shadow: 0 0 40px #7F77DD44;
    }

    .emoji-big {
      font-size: 64px;
      display: block;
      margin-bottom: 1.2rem;
      animation: pulse 2s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50%       { transform: scale(1.15); }
    }

    h1 {
      font-size: 24px;
      font-weight: normal;
      color: #EEEDFE;
      margin-bottom: 0.7rem;
    }

    p.sub {
      font-size: 15px;
      color: #CECBF6;
      margin-bottom: 2rem;
      line-height: 1.8;
    }

    .buttons-row {
      display: flex;
      gap: 16px;
      justify-content: center;
      align-items: center;
    }

    .btn-sim {
      background: #7F77DD;
      color: #fff;
      border: none;
      border-radius: 50px;
      padding: 14px 38px;
      font-size: 17px;
      font-family: Georgia, serif;
      cursor: pointer;
      transition: background 0.15s, transform 0.15s;
      flex-shrink: 0;
    }

    .btn-sim:hover { background: #534AB7; transform: scale(1.06); }
    .btn-sim:active { transform: scale(0.97); }

    .btn-nao {
      background: transparent;
      color: #CECBF6;
      border: 2px solid #7F77DD;
      border-radius: 50px;
      padding: 14px 28px;
      font-size: 17px;
      font-family: Georgia, serif;
      cursor: pointer;
      white-space: nowrap;
    }

    #nao-container {
      position: relative;
      flex-shrink: 0;
    }

    #yes-screen {
      display: none;
      flex-direction: column;
      align-items: center;
      text-align: center;
    }

    #yes-screen .emoji-big {
      animation: bounce 0.6s ease infinite alternate;
    }

    @keyframes bounce {
      from { transform: translateY(0); }
      to   { transform: translateY(-14px); }
    }

    #yes-screen h1 { font-size: 28px; color: #EEEDFE; margin-bottom: 0.7rem; }
    #yes-screen p  { font-size: 15px; color: #CECBF6; line-height: 1.8; }

    .confetti-piece {
      position: fixed;
      width: 10px;
      height: 10px;
      border-radius: 2px;
      pointer-events: none;
      z-index: 999;
      animation: confettiFall 1.8s ease-in forwards;
    }

    @keyframes confettiFall {
      0%   { transform: translateY(-10px) rotate(0deg); opacity: 1; }
      100% { transform: translateY(100vh) rotate(720deg); opacity: 0; }
    }
  </style>
</head>
<body>

  <div class="card" id="main-card">
    <span class="emoji-big">💜</span>
    <h1>Quer namorar comigo?</h1>
    <p class="sub">moooo desculpa<br>aceita 😞💔</p>
    <div class="buttons-row">
      <button class="btn-sim" onclick="handleSim()">Sim</button>
      <div id="nao-container">
        <button class="btn-nao" id="btn-nao" onclick="handleNao()">Não</button>
      </div>
    </div>
  </div>

  <div class="card" id="yes-screen">
    <span class="emoji-big">🎉</span>
    <h1>Ebaaa</h1>
    <p>teamo</p>
  </div>

  <script>
    for (let i = 0; i < 14; i++) {
      const h = document.createElement('span');
      h.className = 'heart-particle';
      h.textContent = '♥';
      h.style.left = (Math.random() * 92) + '%';
      h.style.top  = (Math.random() * 80 + 5) + '%';
      h.style.animationDelay = (Math.random() * 5) + 's';
      h.style.fontSize = (12 + Math.random() * 18) + 'px';
      document.body.appendChild(h);
    }

    const messages = ['Não', 'Tem certeza?', 'Pensa bem...', 'Por favor mo', 'Eu imploro', 'aceita logo amooor'];
    let naoCount = 0;
    const naoBtn = document.getElementById('btn-nao');
    const naoContainer = document.getElementById('nao-container');

    function handleNao() {
      naoCount++;
      naoBtn.textContent = messages[Math.min(naoCount, messages.length - 1)];

      const btnW = naoContainer.offsetWidth;
      const btnH = naoContainer.offsetHeight;
      const maxX = window.innerWidth  - btnW - 20;
      const maxY = window.innerHeight - btnH - 20;

      naoContainer.style.position = 'fixed';
      naoContainer.style.left = (10 + Math.random() * maxX) + 'px';
      naoContainer.style.top  = (10 + Math.random() * maxY) + 'px';
      naoContainer.style.zIndex = '999';
    }

    function handleSim() {
      launchConfetti();
      document.getElementById('main-card').style.display = 'none';
      naoContainer.style.display = 'none';
      const ys = document.getElementById('yes-screen');
      ys.style.display = 'flex';
      ys.style.flexDirection = 'column';
    }

    function launchConfetti() {
      const colors = ['#7F77DD','#AFA9EC','#EEEDFE','#D4537E','#CECBF6','#534AB7'];
      for (let i = 0; i < 50; i++) {
        setTimeout(() => {
          const c = document.createElement('div');
          c.className = 'confetti-piece';
          c.style.left = (5 + Math.random() * 90) + '%';
          c.style.top  = '0px';
          c.style.background = colors[Math.floor(Math.random() * colors.length)];
          c.style.animationDelay = (Math.random() * 0.5) + 's';
          document.body.appendChild(c);
          setTimeout(() => c.remove(), 2500);
        }, i * 20);
      }
    }
  </script>
</body>
</html>
